<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Edit Patient Details</h2>

<form action="/update/{{ patient[0] }}" method="POST">

    <label>Full Name</label><br>
    <input type="text" name="full_name" value="{{ patient[1] }}" required><br><br>

    <label>Date of Birth</label><br>
    <input type="date" name="dob" value="{{ patient[2] }}" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ patient[3] }}" required><br><br>

    <label>Glucose</label><br>
    <input type="number" step="0.1" name="glucose" value="{{ patient[4] }}" required><br><br>

    <label>Haemoglobin</label><br>
    <input type="number" step="0.1" name="haemoglobin" value="{{ patient[5] }}" required><br><br>

    <label>Cholesterol</label><br>
    <input type="number" step="0.1" name="cholesterol" value="{{ patient[6] }}" required><br><br>

    <input type="submit" value="Update Patient">

</form>

<br>

<a href="/">Back to Home</a>

</body>
</html>
